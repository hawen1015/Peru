<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Peru & Bolivia 2025</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<style>
       body { font-family: 'Noto Sans JP', sans-serif; background-color: #F9F8F4; color: #2D3436; }
       .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(230, 230, 230, 0.5); }
       .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
       ::-webkit-scrollbar { display: none; }
</style>
</head>
<body class="antialiased">
<header class="sticky top-0 z-50 glass-card px-6 py-4 flex justify-between items-center">
<h1 class="text-lg font-medium tracking-widest text-gray-800">南美之巔 10.08</h1>
<span class="text-xs bg-indigo-50 text-indigo-600 px-2 py-1 rounded">Day 1-18</span>
</header>
<main class="p-4 space-y-6 mb-24">
<section class="rounded-3xl p-6 bg-slate-800 text-white shadow-xl">
<div class="flex justify-between items-start">
<div>
<p class="text-sm opacity-80">Current Location</p>
<h2 class="text-2xl font-light">Lima, Peru</h2>
</div>
<div class="text-right">
<p class="text-3xl font-light">22°C</p>
<p class="text-xs opacity-80">多雲時晴</p>
</div>
</div>
</section>
<div id="itinerary" class="space-y-4">
<div class="glass-card rounded-2xl overflow-hidden shadow-sm">
<div class="p-4 border-b border-gray-100 flex justify-between items-center bg-white/50">
<span class="text-xs font-bold tracking-tighter text-gray-400">DAY 02 / 10.09</span>
<span class="text-sm font-medium">利馬城市巡禮</span>
</div>
<div class="p-4 space-y-4">
<div class="flex items-start gap-3">
<div class="w-1 h-12 bg-indigo-400 rounded-full mt-1"></div>
<div>
<p class="text-xs text-gray-400 font-medium">10:00 景點</p>
<p class="text-sm font-bold">聖馬丁廣場 & 人骨教堂</p>
<p class="text-xs text-gray-500 mt-1 italic">「必看：地下墓穴的幾何排列美學」</p>
</div>
</div>
<div class="flex gap-2">
<a href="https://www.google.com/maps/search/?api=1&query=Catacumbas+San+Francisco" class="text-xs bg-white border border-gray-200 px-3 py-2 rounded-full flex items-center gap-1 shadow-sm">
                           📍 Google Map
</a>
<span class="text-xs bg-orange-50 text-orange-600 px-3 py-2 rounded-full font-bold">必吃美食：Ceviche</span>
</div>
</div>
</div>
</div>
</main>
<nav class="fixed bottom-6 left-6 right-6 h-16 glass-card rounded-full shadow-2xl flex justify-around items-center px-4 z-50">
<button class="flex flex-col items-center text-indigo-600">
<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
<span class="text-[10px] mt-1">行程</span>
</button>
<button class="flex flex-col items-center text-gray-400">
<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
<span class="text-[10px] mt-1">地圖</span>
</button>
<button class="flex flex-col items-center text-gray-400">
<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
<span class="text-[10px] mt-1">行李</span>
</button>
</nav>
<script>
       // Service Worker Registration for PWA
       if ('serviceWorker' in navigator) {
           window.addEventListener('load', () => {
               navigator.serviceWorker.register('/sw.js').then(reg => console.log('SW registered'));
           });
       }
</script>
</body>
</html>
